name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Build Android
        run: ./gradlew :androidApp:assembleDebug --no-daemon

      - name: Run shared tests
        run: ./gradlew :shared:testDebugUnitTest --no-daemon

      - name: Upload APK
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: atmos-debug
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 7

  ios-framework:
    name: iOS Framework Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Build iOS framework (simulator)
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 --no-daemon

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run Android lint
        run: ./gradlew :shared:lintDebug --no-daemon

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: shared/build/reports/lint-results-debug.html
          retention-days: 7
