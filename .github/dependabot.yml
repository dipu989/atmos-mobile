version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      kotlin:
        patterns: ["org.jetbrains.kotlin*", "org.jetbrains.compose*"]
      ktor:
        patterns: ["io.ktor*"]
      koin:
        patterns: ["io.insert-koin*"]
      androidx:
        patterns: ["androidx.*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
